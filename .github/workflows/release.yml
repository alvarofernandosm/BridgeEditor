name: Release

# Compila los instaladores de las 3 plataformas y los publica como
# GitHub Release cada vez que se empuja un tag v* (ej: git tag v0.1.0).
# workflow_dispatch permite relanzar el build sin re-taguear: publica al
# release que coincida con la versión del package.json de main.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # El Release se crea UNA vez antes de la matriz: si cada job lo crea por su
  # cuenta y dos terminan a la vez, GitHub acepta dos releases con el mismo
  # tag y los instaladores quedan repartidos entre ambos.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Crear el Release del tag (si no existe)
        run: |
          # en workflow_dispatch no hay tag: electron-builder publicará al
          # release existente que coincida con la versión del package.json
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
              gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                --title "${GITHUB_REF_NAME#v}" --notes ""
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        # Las imágenes de Windows ya solo traen Visual Studio 2026: el
        # node-gyp 9 de @electron/rebuild no lo detecta, así que package.json
        # lo sube a 13 vía overrides y windows-latest vuelve a funcionar.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-gyp (compilación de node-pty) necesita distutils, eliminado en
      # Python 3.12 — los runners de Windows/macOS lo traen por defecto.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias (compila node-pty para esta plataforma)
        run: npm ci

      - name: Compilar la app
        run: npm run build

      # Si existen los secrets de Apple (MAC_CERT_P12 + credenciales de
      # notarización), el build de macOS sale firmado y notarizado; si no,
      # se empaqueta sin firmar como siempre (workaround: xattr -cr).
      - name: Empaquetar y publicar en el Release
        shell: bash
        run: |
          EXTRA=""
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$MAC_CERT_P12" ]; then
            echo "Certificado presente: firma y notarización de macOS ACTIVADAS"
            export CSC_LINK="$MAC_CERT_P12"
            export CSC_KEY_PASSWORD="$MAC_CERT_PASSWORD"
            EXTRA="-c.mac.notarize=true"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --publish always $EXTRA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
